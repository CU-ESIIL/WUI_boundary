name: Boundary Scaling Demo

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run scaffold tests
        run: python -m unittest discover -s tests -v

      - name: Run minimal boundary scaling analysis
        run: python scripts/run_minimal_boundary_scaling.py

      - name: Upload minimal demo outputs
        uses: actions/upload-artifact@v4
        with:
          name: boundary-scaling-minimal-demo
          path: outputs/minimal_demo/
          if-no-files-found: error

  publish-doc-assets:
    runs-on: ubuntu-latest
    needs: run-analysis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download minimal demo artifact
        uses: actions/download-artifact@v4
        with:
          name: boundary-scaling-minimal-demo
          path: outputs/minimal_demo

      - name: Copy website-facing assets
        run: |
          mkdir -p docs/assets/figures docs/assets/data
          cp outputs/minimal_demo/boundary_scaling_plot.png docs/assets/figures/boundary_scaling_plot.png
          cp outputs/minimal_demo/boundary_scaling_summary.csv docs/assets/data/boundary_scaling_summary.csv

      - name: Commit website assets back to branch
        if: github.event_name == 'workflow_dispatch' && github.actor != 'github-actions[bot]'
        run: |
          if [ -z "${GITHUB_HEAD_REF}" ]; then
            BRANCH="${GITHUB_REF_NAME}"
          else
            BRANCH="${GITHUB_HEAD_REF}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/figures/boundary_scaling_plot.png docs/assets/data/boundary_scaling_summary.csv
          if git diff --cached --quiet; then
            echo "No website asset changes to commit."
            exit 0
          fi
          git commit -m "Update boundary scaling demo website assets"
          git push origin "HEAD:${BRANCH}"
