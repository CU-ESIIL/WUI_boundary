name: Boundary Scaling Demo

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run scaffold tests
        run: python -m unittest discover -s tests -v

      - name: Run minimal boundary scaling analysis
        run: python scripts/run_minimal_boundary_scaling.py --include-satellite-demo

      - name: Run streaming real-data boundary scaling analysis
        timeout-minutes: 10
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/run_streaming_wui_scaling.py \
            --bbox=-105.271,40.018,-105.268,40.021 \
            --outdir outputs/real_data_demo \
            --resolutions=10,20,40,80 \
            --adj-buffer=30 \
            --publish-doc-assets

      - name: Verify required docs-facing real-data assets
        run: |
          required=(
            docs/assets/figures/real_interface_scaling.png
            docs/assets/data/real_interface_scaling.csv
          )
          for path in "${required[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "::error::Missing required docs-facing real-data asset: $path"
              exit 1
            fi
          done

      - name: Verify generated real-data outputs
        run: |
          required=(
            outputs/real_data_demo/interface_scaling.png
            outputs/real_data_demo/interface_scaling.csv
            outputs/real_data_demo/interface_scaling.json
          )
          for path in "${required[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "::error::Missing required real-data output: $path"
              exit 1
            fi
          done

      - name: Upload minimal demo outputs
        uses: actions/upload-artifact@v4
        with:
          name: boundary-scaling-minimal-demo
          path: outputs/minimal_demo/
          if-no-files-found: error

      - name: Upload real-data demo outputs
        uses: actions/upload-artifact@v4
        with:
          name: boundary-scaling-real-data-demo
          path: outputs/real_data_demo/
          if-no-files-found: error

  publish-doc-assets:
    runs-on: ubuntu-latest
    needs: run-analysis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download minimal demo artifact
        uses: actions/download-artifact@v4
        with:
          name: boundary-scaling-minimal-demo
          path: outputs/minimal_demo

      - name: Download real-data demo artifact
        uses: actions/download-artifact@v4
        with:
          name: boundary-scaling-real-data-demo
          path: outputs/real_data_demo

      - name: Copy website-facing assets
        run: |
          mkdir -p docs/assets/figures docs/assets/data
          cp outputs/minimal_demo/boundary_scaling_plot.svg docs/assets/figures/boundary_scaling_plot.svg
          cp outputs/minimal_demo/satellite_resolution_scaling_plot.svg docs/assets/figures/satellite_resolution_scaling_plot.svg
          cp outputs/minimal_demo/boundary_scaling_summary.csv docs/assets/data/boundary_scaling_summary.csv
          cp outputs/minimal_demo/satellite_resolution_scaling_summary.csv docs/assets/data/satellite_resolution_scaling_summary.csv
          cp outputs/real_data_demo/interface_scaling.png docs/assets/figures/real_interface_scaling.png
          cp outputs/real_data_demo/interface_scaling.csv docs/assets/data/real_interface_scaling.csv

      - name: Commit website assets back to branch
        if: github.event_name == 'workflow_dispatch' && github.actor != 'github-actions[bot]'
        run: |
          if [ -z "${GITHUB_HEAD_REF}" ]; then
            BRANCH="${GITHUB_REF_NAME}"
          else
            BRANCH="${GITHUB_HEAD_REF}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/assets/figures/boundary_scaling_plot.svg \
            docs/assets/figures/satellite_resolution_scaling_plot.svg \
            docs/assets/data/boundary_scaling_summary.csv \
            docs/assets/data/satellite_resolution_scaling_summary.csv \
            docs/assets/figures/real_interface_scaling.png \
            docs/assets/data/real_interface_scaling.csv
          if git diff --cached --quiet; then
            echo "No website asset changes to commit."
            exit 0
          fi
          git commit -m "Update boundary scaling demo website assets"
          git push origin "HEAD:${BRANCH}"
