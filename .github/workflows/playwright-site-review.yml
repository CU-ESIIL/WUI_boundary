name: Playwright Site Review

on:
  pull_request:
  workflow_dispatch:

jobs:
  review-deployed-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run deployed-site review
        env:
          PLAYWRIGHT_TEST_BASE_URL: https://cu-esiil.github.io/WUI_boundary/
        run: |
          echo "Review target URL: https://cu-esiil.github.io/WUI_boundary/"
          npm run test:site-review

      - name: Add workflow summary
        if: always()
        run: |
          {
            echo "## Playwright deployed site review"
            echo ""
            echo "- Target: https://cu-esiil.github.io/WUI_boundary/"
            echo "- Pages covered: home, interactive-experiments, scaling-results, methods-reproducibility, fire-science-implications"
            echo "- Artifacts: playwright-report, test-results (includes screenshots, traces, diagnostics JSON)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn

      - name: Upload Playwright test results and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: warn
