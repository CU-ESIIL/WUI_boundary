site_name: "WUI_boundary"
site_description: "Scale-conditioned WUI boundary length documentation and prototype"
site_url: "https://cu-esiil.github.io/WUI_boundary/"

repo_name: "CU-ESIIL/WUI_boundary"
repo_url: "https://github.com/CU-ESIIL/WUI_boundary"
edit_uri: "edit/main/docs/"

nav:
  - Site:
      - Home: index.md
      - Project Patterns: examples.md
  - UI Drafts:
      - Draft 1 — WUI Boundary Story Lab: ui-drafts/draft-1.md
      - Draft 2 — WUI Boundary Story Lab Remix: ui-drafts/draft-2.md
      - Roadmap to Real Data: ui-drafts/roadmap-to-real-data.md
  - Analytics:
      - Boundary Analytics Scaffold: analytics/scaffold.md
      - Minimal Demo Output: analytics/minimal-demo.md

theme:
  name: material
  logo: assets/esiil_content/esiil_oasis_logo.png
  favicon: assets/esiil_content/favicon.ico
  custom_dir: docs/overrides
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
