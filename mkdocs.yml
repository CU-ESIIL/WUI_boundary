site_name: "WUI Boundary Length Manuscript"
site_description: "A living manuscript on how WUI boundary length depends on delineation and measurement scale"
site_url: "https://cu-esiil.github.io/WUI_boundary/"

repo_name: "CU-ESIIL/WUI_boundary"
repo_url: "https://github.com/CU-ESIIL/WUI_boundary"
edit_uri: "edit/main/docs/"

nav:
  - Home: index.md
  - Why Length Depends on Scale: why-length-depends-on-scale.md
  - What Counts as the WUI Boundary: what-counts-as-wui-boundary.md
  - Interactive Experiments: interactive-experiments.md
  - Scaling Results: scaling-results.md
  - Implications for Remote Sensing: implications-for-remote-sensing.md
  - Fire Science Implications: fire-science-implications.md
  - Real-data Experiments: real-data-experiments.md
  - Visual Figures: visual-figures.md
  - Project Roadmap: project-roadmap.md
  - Reproducible Prompts: reproducible-prompts.md
  - References: references.md
  - Methods & Reproducibility: methods-reproducibility.md

theme:
  name: material
  logo: assets/esiil_content/esiil_oasis_logo.png
  favicon: assets/esiil_content/favicon.ico
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - assets/javascripts/render-scaling-csv.js

plugins:
  - search
