  <text x="32" y="311.50" text-anchor="middle" font-size="17" fill="#1f2e38" transform="rotate(-90 32 311.50)">Measured synthetic boundary length, L_d(epsilon)</text>
  <rect x="140" y="116" width="610" height="92" fill="#ffffff" opacity="0.96" stroke="#d9dee2" rx="8" />
  <text x="154" y="146" font-size="14" fill="#233">Synthetic demonstration only (not empirical satellite inference).</text>
  <text x="154" y="170" font-size="14" fill="#233">log-log fit slope = -0.0820, intercept = 6.7451</text>
  <text x="154" y="193" font-size="14" fill="#233">Finer scales resolve more irregularity; coarser scales shorten apparent interface.</text>
